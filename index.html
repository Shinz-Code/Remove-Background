<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Style Background Remover Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas {
            max-width: 100%;
            height: auto;
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            cursor: crosshair;
        }
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900">Smart BG Remover Pro</h1>
            <p class="text-slate-600">Klik latar belakang. Gunakan "Edge Clean" untuk hasil lebih rapi.</p>
        </header>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="flex flex-col md:flex-row">
                <!-- Kontrol -->
                <div class="w-full md:w-80 p-6 bg-slate-50 border-r border-slate-200 space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">1. Unggah Gambar</label>
                        <label class="flex flex-col items-center px-4 py-6 bg-white text-blue-500 rounded-lg shadow-sm tracking-wide uppercase border border-blue-200 cursor-pointer hover:bg-blue-500 hover:text-white transition-all">
                            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M16.88 9.1A4 4 0 0 1 16 17H5a5 5 0 0 1-1-9.9V7a3 3 0 0 1 4.52-2.59A4.98 4.98 0 0 1 17 8c0 .38-.04.74-.12 1.1zM11 11h3l-4-4-4 4h3v3h2v-3z" /></svg>
                            <span class="mt-2 text-xs font-semibold">Pilih File</span>
                            <input type='file' id="upload" class="hidden" accept="image/*" />
                        </label>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">2. Pengaturan Deteksi</label>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-xs text-slate-500 mb-1">
                                    <span>Toleransi Warna</span>
                                    <span id="tolValue">30</span>
                                </div>
                                <input type="range" id="tolerance" min="0" max="150" value="30" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                            
                            <div>
                                <div class="flex justify-between text-xs text-slate-500 mb-1">
                                    <span>Edge Clean (Erosi)</span>
                                    <span id="erodeValue">1</span>
                                </div>
                                <input type="range" id="erode" min="0" max="5" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                                <p class="text-[10px] text-slate-400 mt-1">*Menghilangkan sisa warna di pinggiran</p>
                            </div>

                            <div>
                                <div class="flex justify-between text-xs text-slate-500 mb-1">
                                    <span>Haluskan Tepi (Feather)</span>
                                    <span id="featherValue">1</span>
                                </div>
                                <input type="range" id="feather" min="0" max="10" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 space-y-3">
                        <button id="resetBtn" class="w-full py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg transition">Reset Gambar</button>
                        <button id="downloadBtn" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow-lg hidden flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12 a2 2 0 002-2v-1M7 10l5 5m0 0l5-5m-5 5V3"></path></svg>
                            Download PNG
                        </button>
                    </div>
                </div>

                <!-- Area Preview -->
                <div class="flex-1 p-6 flex flex-col items-center justify-center relative min-h-[400px]">
                    <div id="loadingOverlay" class="absolute inset-0 bg-white/80 z-10 hidden flex items-center justify-center">
                        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
                    </div>
                    
                    <div id="dropZone" class="text-center p-12 border-4 border-dashed border-slate-200 rounded-2xl w-full h-full flex flex-col items-center justify-center">
                        <p class="text-slate-400 text-lg">Belum ada gambar. Silakan unggah di sini.</p>
                    </div>

                    <canvas id="canvas" class="hidden rounded-lg shadow-2xl"></canvas>
                    
                    <div id="instructionHint" class="hidden mt-4 text-sm text-slate-500 bg-blue-50 px-4 py-2 rounded-full border border-blue-100 italic">
                        💡 Klik bagian background hitam untuk menghapus
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const toleranceInput = document.getElementById('tolerance');
        const erodeInput = document.getElementById('erode');
        const featherInput = document.getElementById('feather');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const dropZone = document.getElementById('dropZone');
        const instructionHint = document.getElementById('instructionHint');

        let originalImage = null;

        // UI Listeners
        toleranceInput.addEventListener('input', e => document.getElementById('tolValue').innerText = e.target.value);
        erodeInput.addEventListener('input', e => document.getElementById('erodeValue').innerText = e.target.value);
        featherInput.addEventListener('input', e => document.getElementById('featherValue').innerText = e.target.value);

        upload.addEventListener('change', handleFile);
        resetBtn.addEventListener('click', () => originalImage && loadToCanvas(originalImage));

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    loadToCanvas(img);
                    dropZone.classList.add('hidden');
                    canvas.classList.remove('hidden');
                    instructionHint.classList.remove('hidden');
                    downloadBtn.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function loadToCanvas(img) {
            const maxDim = 1000;
            let w = img.width;
            let h = img.height;
            if (w > maxDim || h > maxDim) {
                const ratio = Math.min(maxDim / w, maxDim / h);
                w *= ratio;
                h *= ratio;
            }
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);
        }

        canvas.addEventListener('click', function(e) {
            if (!originalImage) return;
            loadingOverlay.classList.remove('hidden');
            setTimeout(() => {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
                const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
                smartRemove(x, y);
                loadingOverlay.classList.add('hidden');
            }, 50);
        });

        function smartRemove(startX, startY) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const targetIdx = (startY * width + startX) * 4;
            const targetR = data[targetIdx];
            const targetG = data[targetIdx + 1];
            const targetB = data[targetIdx + 2];

            const tolerance = parseInt(toleranceInput.value);
            const erodeSize = parseInt(erodeInput.value);
            const featherSize = parseInt(featherInput.value);

            const mask = new Uint8Array(width * height);
            const visited = new Uint8Array(width * height);
            const stack = [[startX, startY]];

            // 1. Flood Fill untuk membuat Mask awal
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const idx = y * width + x;

                if (x < 0 || x >= width || y < 0 || y >= height || visited[idx]) continue;
                visited[idx] = 1;

                const pIdx = idx * 4;
                const r = data[pIdx];
                const g = data[pIdx + 1];
                const b = data[pIdx + 2];

                const dist = Math.sqrt(Math.pow(r - targetR, 2) + Math.pow(g - targetG, 2) + Math.pow(b - targetB, 2));

                if (dist <= tolerance) {
                    mask[idx] = 255; // Tandai untuk dihapus
                    stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }

            // 2. Erosi Mask (Mengecilkan area objek agar sisa background hilang)
            let finalMask = mask;
            if (erodeSize > 0) {
                for (let e = 0; e < erodeSize; e++) {
                    let tempMask = new Uint8Array(finalMask);
                    for (let y = 1; y < height - 1; y++) {
                        for (let x = 1; x < width - 1; x++) {
                            const idx = y * width + x;
                            if (finalMask[idx] === 0) { // Jika ini adalah bagian objek
                                // Jika ada tetangga yang dihapus, ubah ini jadi dihapus juga (erosi objek)
                                if (finalMask[idx - 1] === 255 || finalMask[idx + 1] === 255 || 
                                    finalMask[idx - width] === 255 || finalMask[idx + width] === 255) {
                                    tempMask[idx] = 255;
                                }
                            }
                        }
                    }
                    finalMask = tempMask;
                }
            }

            // 3. Feathering (Pengalusan Alpha)
            const alphaMask = new Float32Array(width * height);
            for (let i = 0; i < finalMask.length; i++) {
                alphaMask[i] = finalMask[i] === 255 ? 0 : 255;
            }

            if (featherSize > 0) {
                // Simple box blur untuk alpha
                for (let pass = 0; pass < 2; pass++) {
                    let tempAlpha = new Float32Array(alphaMask);
                    for (let y = 1; y < height - 1; y++) {
                        for (let x = 1; x < width - 1; x++) {
                            const idx = y * width + x;
                            tempAlpha[idx] = (
                                alphaMask[idx] + 
                                alphaMask[idx-1] + alphaMask[idx+1] + 
                                alphaMask[idx-width] + alphaMask[idx+width]
                            ) / 5;
                        }
                    }
                    alphaMask.set(tempAlpha);
                }
            }

            // 4. Terapkan Mask ke Data Gambar
            for (let i = 0; i < alphaMask.length; i++) {
                data[i * 4 + 3] = alphaMask[i];
            }

            ctx.putImageData(imageData, 0, 0);
        }

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'clean-background.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
